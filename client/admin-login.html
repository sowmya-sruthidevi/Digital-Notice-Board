<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administrator Login — Notice Display System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card" id="loginCard">
      <h1>Administrator Access</h1>
      <p class="subtitle">Only administrators can sign in and manage notice displays.</p>

      <div id="alert" class="alert hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
      </form>

      <p class="auth-link">
        Back to <a href="index.html">Digital Notice Board</a>
      </p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
