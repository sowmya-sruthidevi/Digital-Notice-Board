<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Notice Board — Notice Display System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="board-page">
  <div class="auth-container board-auth-container board-home">
    <div id="alert" class="alert hidden board-alert"></div>

    <section class="notice-board-hero reference-board-ui">
      <div class="board-frame" aria-label="Digital notice board">
        <div class="sticky-note sticky-top-left">Exam Time Table Updated</div>
        <div class="sticky-note sticky-top-right">Coding Club Meet<br>Friday 4 PM</div>
        <div class="sticky-note sticky-right">Placement Drive<br>Hall B</div>
        <div class="sticky-note sticky-left">Library Week<br>Starts Monday</div>
        <div class="sticky-note sticky-bottom-right">Cultural Fest<br>Registrations Open</div>

        <article class="notice-sheet">
          <p class="notice-kicker">Campus Bulletin</p>
          <h1>Digital Notice Board</h1>
          <p class="notice-subtitle">Student updates, announcements, events and timetable notices in one place.</p>

          <div class="board-actions center-actions">
            <button type="button" class="btn btn-primary btn-inline" id="heroSignInBtn">Sign In</button>
            <button type="button" class="btn btn-board-secondary btn-inline" id="heroSignUpBtn">Sign Up</button>
          </div>
        </article>
      </div>
    </section>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
